<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{margin:0;background:#0a0a0a;color:#ededed;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:0 18px 64px}
a{color:#34d399}
.nav{font-size:13px;color:#6b7280;margin:18px 0 0}
.nav a{color:#7aa2ff;text-decoration:none}
.hero{text-align:center;padding:34px 0 8px}
.emoji{font-size:46px}
h1{font-size:28px;font-weight:900;margin:8px 0 0;background:linear-gradient(90deg,#fff,#9ee7c8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.lead{color:#9ca3af;margin:12px auto 0;max-width:560px;font-size:15px}
.cta{display:inline-block;margin-top:22px;background:#10b981;color:#06281f;font-weight:800;font-size:16px;text-decoration:none;padding:13px 26px;border-radius:14px;transition:transform .14s}
.cta:hover{transform:translateY(-2px)}
.ad{margin:30px 0 0;min-height:90px;display:flex;align-items:center;justify-content:center;border:1px dashed #232323;border-radius:14px;color:#2f2f2f;font-size:12px}
.about{margin:34px 0 0}
.about h2{font-size:17px;font-weight:800;color:#e5e7eb;margin:26px 0 10px}
.about p{color:#c4c9d2;font-size:15px;margin:0 0 12px}
.about ul,.about ol{margin:0 0 12px;padding-left:22px;color:#c4c9d2;font-size:14.5px}
.about li{margin:6px 0}
.about .qa{margin:0 0 14px}
.about .qa .q{color:#e5e7eb;font-weight:700;margin:0 0 4px;font-size:14.5px}
.about .qa .a{color:#b8bec8;margin:0;font-size:14.5px}
.about .disclaimer{color:#8b8f98;font-size:13px;background:#131313;border:1px solid #232323;border-radius:10px;padding:11px 13px;margin:18px 0 0}
.cat-note{color:#6b7280;font-size:13px;margin-top:14px}
.related{margin:38px 0 0}
.related h2{font-size:15px;font-weight:800;color:#d4d4d4;margin:0 0 14px}
.rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rel{display:flex;align-items:center;gap:8px;text-decoration:none;border:1px solid #232323;background:#161616;border-radius:12px;padding:11px 13px;color:#e5e7eb;font-size:14px;transition:border-color .14s,transform .14s}
.rel:hover{border-color:#10b981;transform:translateY(-1px)}
.rel span{font-size:18px}
footer{margin-top:44px;text-align:center;color:#6b7280;font-size:12px;border-top:1px solid #1c1c1c;padding-top:22px}
footer a{color:#7aa2ff;margin:0 7px;text-decoration:none}
@media (max-width:520px){.rel-grid{grid-template-columns:1fr}h1{font-size:23px}}
</style>
</head>
<body>
<div class="wrap">

  </div>
  <div class="ad">광고 영역</div>
  <section class="about">%%BODY%%</section>
  <div class="coupang-slot" data-subid="%%SLUG%%" style="margin:28px 0 0"></div>

  </section>
  <footer>

</div>
