<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>내 프로젝트 허브</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #0a0a0a; color: #ededed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 40px 18px 60px; }
    h1 { font-size: 30px; font-weight: 800; margin: 0; }
    .sub { color: #9ca3af; margin-top: 8px; }
    .meta { color: #6b7280; font-size: 12px; margin-top: 4px; }
    .grid { margin-top: 28px; display: grid; gap: 14px; }
    .card { border: 1px solid #262626; background: #171717; border-radius: 18px; padding: 18px; transition: transform .15s, border-color .15s; }
    .card:hover { transform: translateY(-2px); border-color: #10b981; }
    .top { display: flex; align-items: center; gap: 10px; }
    .emoji { font-size: 26px; }
    .name { font-size: 18px; font-weight: 700; }
    .badge { margin-left: auto; font-size: 11px; padding: 3px 9px; border-radius: 999px; }
    .b-live { background: #064e3b; color: #6ee7b7; }
    .b-deploying { background: #3f3f00; color: #fde047; }
    .b-repo { background: #1f2937; color: #93c5fd; }
    .domain { color: #34d399; font-size: 12px; margin-top: 8px; }
    .desc { color: #d4d4d4; font-size: 14px; margin-top: 6px; line-height: 1.55; }
    .links { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .links a { text-decoration: none; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 10px; }
    .a-live { background: #10b981; color: #06281f; }
    .a-gh { background: #262626; color: #e5e7eb; }
    .empty { color: #6b7280; }
    footer { margin-top: 40px; text-align: center; color: #4b5563; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🚀 내 프로젝트 허브</h1>
    <p class="sub">매일 자동 생성·배포되는 프로젝트들이 한 곳에 모입니다.</p>
    <p class="meta" id="meta">불러오는 중…</p>
    <div class="grid" id="grid"></div>
    <footer>자동 업데이트 · projects.json 푸시 시 즉시 반영</footer>
  </div>

  <script>
    // GitHub raw에서 최신 레지스트리를 읽고(푸시만 하면 즉시 갱신), 실패 시 로컬 fallback
    const RAW = "https://raw.githubusercontent.com/dydrms6388-sudo/project-hub/master/projects.json";
    const badge = (s) => s === "live" ? ["b-live","🟢 라이브"] : s === "deploying" ? ["b-deploying","🟡 배포중"] : ["b-repo","🔵 레포"];
    function render(data) {
      document.getElementById("meta").textContent = "마지막 업데이트: " + (data.updatedAt || "-") + " · 총 " + data.projects.length + "개";
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      for (const p of data.projects) {
        const [bc, bt] = badge(p.status);
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML =
          '<div class="top"><span class="emoji">' + (p.emoji||"📦") + '</span>' +
          '<span class="name">' + p.name + '</span>' +
          '<span class="badge ' + bc + '">' + bt + '</span></div>' +
          '<div class="domain">' + (p.domain||"") + ' · ' + (p.date||"") + '</div>' +
          '<div class="desc">' + (p.desc||"") + '</div>' +
          '<div class="links">' +
          (p.live ? '<a class="a-live" href="' + p.live + '" target="_blank" rel="noopener">🔗 라이브 열기</a>' : '<span class="empty" style="font-size:12px;align-self:center">라이브 준비중</span>') +
          (p.github ? '<a class="a-gh" href="' + p.github + '" target="_blank" rel="noopener">GitHub</a>' : '') +
          '</div>';
        grid.appendChild(el);
      }
    }
    fetch(RAW + "?t=" + Date.now()).then(r => r.json()).then(render)
      .catch(() => fetch("./projects.json").then(r => r.json()).then(render)
        .catch(() => { document.getElementById("meta").textContent = "레지스트리를 불러오지 못했어요."; }));
  </script>
</body>
</html>
