name: Deploy isitnormal (production)

# isitnormal/ 변경이 master에 머지될 때 정상인가요 앱을 자체 Vercel 프로젝트로 배포합니다.
# 기존 factory 배포(deploy.yml)와 별개 — isitnormal은 Root Directory=isitnormal 인 별도 프로젝트입니다.
#
# ── 사전 준비 (한 번) ──
#  1) Supabase 프로젝트 생성 → SQL editor에서 isitnormal/supabase/schema.sql 실행
#     → SUPABASE_SERVICE_ROLE_KEY=... NEXT_PUBLIC_SUPABASE_URL=... npx tsx isitnormal/supabase/seed.ts
#  2) Vercel에서 새 프로젝트 생성 → Root Directory = isitnormal, Framework = Next.js
#     → 환경변수: NEXT_PUBLIC_SITE_URL(실제 도메인), NEXT_PUBLIC_SUPABASE_URL/ANON_KEY,
#        SUPABASE_SERVICE_ROLE_KEY, VOTER_SALT, ADMIN_TOKEN, CRON_SECRET,
#        GOOGLE_SITE_VERIFICATION(선택), (트래픽 후) NEXT_PUBLIC_UGC_ENABLED=1
#  3) 리포 Settings → Secrets에 아래 3개 등록:
#        ISN_VERCEL_TOKEN / ISN_VERCEL_ORG_ID / ISN_VERCEL_PROJECT_ID
#     (값: isitnormal 디렉터리에서 `npx vercel link` → `cat .vercel/project.json`)

on:
  push:
    branches: [master]
    paths: ["isitnormal/**"]
  workflow_dispatch: {}

concurrency:
  group: vercel-isitnormal
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'dydrms6388-sudo/project-hub' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.ISN_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.ISN_VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — secrets present?
        id: guard
        run: |
          if [ -z "${{ secrets.ISN_VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::isitnormal Vercel 시크릿(ISN_VERCEL_TOKEN/ORG_ID/PROJECT_ID)이 없어 배포를 건너뜁니다."
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.guard.outputs.ok == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        if: steps.guard.outputs.ok == 'true'
        run: vercel pull --yes --environment=production --token="${{ secrets.ISN_VERCEL_TOKEN }}"

      - name: Deploy to production
        if: steps.guard.outputs.ok == 'true'
        run: |
          url=$(vercel deploy --prod --token="${{ secrets.ISN_VERCEL_TOKEN }}" --yes)
          echo "Deployed: $url"
          echo "### ✅ isitnormal 프로덕션 배포 완료" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
